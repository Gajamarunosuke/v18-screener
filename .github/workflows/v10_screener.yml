name: V10 Screener

on:
  schedule:
    # 月〜金 16:00 JST（UTC 07:00）
    - cron: '59 7 * * *'
  workflow_dispatch:

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: V10スクリーナー実行
        env:
          TZ: Asia/Tokyo
          DISCORD_WEBHOOK_V10: ${{ secrets.DISCORD_WEBHOOK_V10 }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
          python v10_screener.py \
            --gsheet-id "$GSHEET_ID" \
            --discord-webhook "$DISCORD_WEBHOOK_V10"
