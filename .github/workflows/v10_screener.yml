name: V10 Screener

on:
  schedule:
    # 月〜金 16:05 JST（UTC 07:05）
    - cron: '5 7 * * 1-5'
  workflow_dispatch:

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: V10スクリーナー実行
        env:
          TZ: Asia/Tokyo
          DISCORD_WEBHOOK_V10: ${{ secrets.DISCORD_WEBHOOK_V10 }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          NOW_HM=$(TZ=Asia/Tokyo date +%H%M)
          EVENT_NAME="${{ github.event_name }}"

          if [ "$EVENT_NAME" = "schedule" ]; then
            if [ "$NOW_HM" -lt 1600 ] || [ "$NOW_HM" -gt 1630 ]; then
              echo "Skip scheduled V10 run outside 16:00-16:30 JST. now=$NOW_HM"
              exit 0
            fi
          fi

          echo "$GCP_SA_KEY" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
          python v10_screener.py \
            --gsheet-id "$GSHEET_ID" \
            --discord-webhook "$DISCORD_WEBHOOK_V10"


