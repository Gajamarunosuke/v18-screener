name: V18スクリーナー 自動実行

on:
  schedule:
    # 毎週金曜 15:45 JST（UTC 06:45）
    - cron: '45 6 * * 5'
  workflow_dispatch:  # 手動実行ボタン

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install yfinance pandas gspread google-auth pytz openpyxl

      - name: V18スクリーナー実行
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
          python v18_screener.py \
            --gsheet-id "$GSHEET_ID" \
            --discord-webhook "$DISCORD_WEBHOOK"
