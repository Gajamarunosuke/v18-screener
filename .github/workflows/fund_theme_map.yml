name: Fund Theme Map

on:
  workflow_dispatch:  # 定期実行は cron-job.org から週次dispatch（NISAランキングと同枠）

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          pip install -r requirements.txt

      - name: Post fund theme map
        env:
          TZ: Asia/Tokyo
          DISCORD_WEBHOOK_MARKET_NISA: ${{ secrets.DISCORD_WEBHOOK_MARKET_NISA }}
        run: python fund_theme_map.py --post
