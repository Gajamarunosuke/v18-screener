name: Market NISA Fund Ranking

on:
  workflow_dispatch:
    inputs:
      period:
        description: 'ランキング期間'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly

jobs:
  ranking:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 楽天証券NISA買付ランキングをDiscord投稿
        env:
          DISCORD_WEBHOOK_MARKET_NISA: ${{ secrets.DISCORD_WEBHOOK_MARKET_NISA }}
        run: python fund_ranking.py --period "${{ inputs.period }}" --limit 10
